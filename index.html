<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حساسيات فري فاير</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
      url('62D7EF75-44B7-418B-A491-21A3466AD923.jpeg');
      background-size: cover;
      background-position: center;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 25px;
      padding: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 38px;
      color: #facc15;
    }

    p {
      text-align: center;
      margin-bottom: 25px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 15px;
      border: none;
      outline: none;
      font-size: 18px;
      margin-bottom: 20px;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 15px;
      background: #facc15;
      color: black;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      background: #fde047;
    }

    .result {
      margin-top: 30px;
      display: none;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 20px;
    }

    .setting {
      display: flex;
      justify-content: space-between;
      background: #0f172a;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 18px;
    }

    .value {
      color: #22c55e;
      font-weight: bold;
    }

    .phoneName {
      text-align: center;
      margin-bottom: 20px;
      font-size: 25px;
      color: #38bdf8;
      font-weight: bold;
    }

    .note {
      margin-top: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
        border-radius: 18px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      input,
      button {
        font-size: 16px;
        padding: 14px;
      }

      .setting {
        font-size: 15px;
        padding: 12px;
      }

      .phoneName {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🔥 حساسيات Free Fire</h1>
  <p>اكتب اسم الجوال بالعربي أو الإنجليزي وخذ أفضل حساسية مناسبة له</p>

  <input
    type="text"
    id="phoneInput"
    placeholder="مثال: iPhone 13 أو ايفون 13"
    onkeypress="if(event.key==='Enter') generateSensitivity()"
  >

  <button onclick="generateSensitivity()">طلع الحساسية</button>

  <div class="result" id="resultBox">

    <div class="phoneName" id="phoneName"></div>

    <div class="setting">
      <span>الحساسية العامة</span>
      <span class="value" id="general"></span>
    </div>

    <div class="setting">
      <span>النقطة الحمراء</span>
      <span class="value" id="redDot"></span>
    </div>

    <div class="setting">
      <span>2X سكوب</span>
      <span class="value" id="scope2x"></span>
    </div>

    <div class="setting">
      <span>4X سكوب</span>
      <span class="value" id="scope4x"></span>
    </div>

    <div class="setting">
      <span>قناص AWM</span>
      <span class="value" id="awm"></span>
    </div>

    <div class="setting">
      <span>النظر الحر</span>
      <span class="value" id="freeLook"></span>
    </div>

    <div class="note">
      كل ضغطة تعطيك حساسية جديدة ومحسنة حسب نوع جهازك 🔥
    </div>

  </div>
</div>

<script>
  function random(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateSensitivity() {

    const validBrands = [
      "iphone", "ايفون", "samsung", "سامسونج", "xiaomi", "شاومي",
      "redmi", "ريدمي", "oppo", "اوبو", "realme", "ريلمي",
      "huawei", "هواوي", "honor", "هونر", "vivo", "فيفو",
      "oneplus", "ون بلس", "rog", "redmagic", "ريد ماجيك",
      "nokia", "نوكيا", "sony", "سوني", "infinix", "انفنكس"
    ];

    const phone = document.getElementById("phoneInput").value.trim();
    const lowerPhone = phone.toLowerCase();

    if(phone === "") {
      alert("اكتب اسم الجوال أول");
      return;
    }

    const isValidPhone = validBrands.some((b) => lowerPhone.includes(b));

    if(phone.length < 3 || !isValidPhone) {
      alert("اكتب اسم جوال معروف بالعربي أو الإنجليزي");
      document.getElementById("resultBox").style.display = "none";
      return;
    }

    let power = "medium";

    const highPhones = [
      "iphone 15", "iphone 14", "iphone 13", "iphone 12",
      "ايفون 15", "ايفون 14", "ايفون 13", "ايفون 12",
      "s24", "s23", "سامسونج s24", "سامسونج s23",
      "rog", "redmagic", "ريد ماجيك", "ipad",
      "xiaomi 14", "شاومي 14", "oneplus", "ون بلس"
    ];

    const lowPhones = [
      "j2", "j5", "a10", "a20",
      "ريدمي 9", "redmi 9",
      "oppo a3", "اوبو a3",
      "سامسونج a10", "سامسونج a20"
    ];

    if(highPhones.some(p => lowerPhone.includes(p))) {
      power = "high";
    }
    else if(lowPhones.some(p => lowerPhone.includes(p))) {
      power = "low";
    }

    let sensitivity = {};

    if(power === "high") {
      sensitivity = {
        general: random(170, 200),
        redDot: random(165, 200),
        scope2x: random(150, 190),
        scope4x: random(130, 180),
        awm: random(90, 150),
        freeLook: random(160, 200)
      };
    }
    else if(power === "medium") {
      sensitivity = {
        general: random(145, 185),
        redDot: random(140, 180),
        scope2x: random(125, 170),
        scope4x: random(110, 155),
        awm: random(75, 130),
        freeLook: random(135, 180)
      };
    }
    else {
      sensitivity = {
        general: random(120, 160),
        redDot: random(115, 155),
        scope2x: random(100, 145),
        scope4x: random(85, 130),
        awm: random(60, 110),
        freeLook: random(120, 165)
      };
    }

    document.getElementById("resultBox").style.display = "block";

    document.getElementById("phoneName").innerText = "📱 " + phone;

    document.getElementById("general").innerText = sensitivity.general;
    document.getElementById("redDot").innerText = sensitivity.redDot;
    document.getElementById("scope2x").innerText = sensitivity.scope2x;
    document.getElementById("scope4x").innerText = sensitivity.scope4x;
    document.getElementById("awm").innerText = sensitivity.awm;
    document.getElementById("freeLook").innerText = sensitivity.freeLook;
  }
</script>

</body>
</html>
